name: Test Suite

# Central CI for the rimir TiddlyWiki plugin suite.
# Runs Jasmine (umbrella) + Playwright (E2E) + gotchas (CLI regressions) against
# all public plugins. Per-plugin Jasmine CI (notify-library.yml) stays as-is for
# fast per-plugin gating; this workflow proves the whole suite still works together.
#
# Triggers:
#   - push to main of tw-tests itself
#   - pull_request to main
#   - workflow_dispatch (manual run)
#   - repository_dispatch type "plugin-updated" (one fires per plugin push)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [plugin-updated]

# Coalesce bursts (e.g. several plugins pushed back-to-back) onto a single
# trailing run. The in-flight run is cancelled when a newer dispatch arrives.
concurrency:
  group: test-suite
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Workspace layout MUST mirror the local dev setup:
    #
    #   $GITHUB_WORKSPACE/
    #     tw-tests/                       <- this repo (checked out as subdir)
    #     dev-wiki/plugins/rimir/<plugin> <- cloned in "Clone public plugins"
    #     node_modules/                   <- created by "Install npm dependencies"
    #     package.json                    <- created by "Install npm dependencies"
    #
    # testwiki.sh and playwright.config.js both reference plugins via
    # `../dev-wiki/plugins`; gotchas/run.sh references `../../node_modules`.
    # Both expect $GITHUB_WORKSPACE as the parent of tw-tests/.
    steps:
      - name: Checkout tw-tests (as subdirectory)
        uses: actions/checkout@v4
        with:
          path: tw-tests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies (at workspace root)
        run: |
          cat > package.json <<'EOF'
          {
            "name": "tw-tests-ci",
            "private": true,
            "dependencies": {
              "tiddlywiki": "~5.4.0",
              "chokidar": "^4.0.3"
            },
            "devDependencies": {
              "@playwright/test": "^1.58.2"
            }
          }
          EOF
          npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Clone public plugins (at workspace root)
        run: |
          mkdir -p dev-wiki/plugins/rimir
          PLUGINS=(
            appify capture components core-hook cytoscape-engine diffsync
            doc-template explide ext-connect external-llm-help file-pipeline
            file-upload filesystem-watcher frontmatter git-int json-dsl
            knowledge-app llm-connect llm-help mindmap mindmap-elixir minver
            msg-import namespace present realms runner scattered-binaries
            statewrap theme typed
          )
          for p in "${PLUGINS[@]}"; do
            echo "  cloning $p"
            git clone --depth 1 "https://github.com/rimir-cc/tw-${p}.git" "dev-wiki/plugins/rimir/${p}" 2>&1 | sed 's/^/    /'
          done

      - name: Stage flibbles fixtures for namespace test-edition
        # namespace/test-edition/tiddlers/tiddlywiki.files references
        # ../../../../../tiddlers/_system/plugins/flibbles/{relink,relink-titles}.json
        # which resolves to <workspace>/dev-wiki/tiddlers/... when plugins are
        # loaded via an absolute TIDDLYWIKI_PLUGIN_PATH (set by testwiki.sh).
        # Locally these come from the dev-wiki; in CI we ship them as fixtures
        # in the namespace plugin's repo under .github/ci-fixtures/.
        run: |
          mkdir -p dev-wiki/tiddlers/_system/plugins/flibbles
          cp dev-wiki/plugins/rimir/namespace/.github/ci-fixtures/relink.json \
             dev-wiki/tiddlers/_system/plugins/flibbles/relink.json
          cp dev-wiki/plugins/rimir/namespace/.github/ci-fixtures/relink-titles.json \
             dev-wiki/tiddlers/_system/plugins/flibbles/relink-titles.json

      - name: Run Jasmine (umbrella)
        working-directory: tw-tests
        run: ./testwiki.sh

      - name: Run gotchas
        working-directory: tw-tests
        run: ./gotchas/run.sh

      - name: Run Playwright
        # pwwiki.sh's webServer setting spawns `npx tiddlywiki pw-edition --listen port=9091` itself.
        working-directory: tw-tests
        run: ./pwwiki.sh

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tw-tests/playwright-report/
            tw-tests/test-results/
          if-no-files-found: ignore
          retention-days: 7
